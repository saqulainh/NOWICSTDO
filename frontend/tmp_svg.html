<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; display: flex; gap: 2rem; padding: 2rem; flex-wrap: wrap; }
        svg { background: #222; border: 1px solid #444; width: 200px; height: 300px; }
        path { stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>
    <div>
        <h3>Path 1</h3>
        <svg viewBox="0 0 100 150">
            <path stroke="#34d99a" d="M 70 30 C 50 10, 20 20, 20 50 C 20 80, 80 70, 80 100 C 80 130, 50 140, 30 120" />
            <!-- Path for C -->
            <!-- Path for S -->
        </svg>
    </div>
    <div>
        <h3>Path 2 (More Elegant)</h3>
        <svg viewBox="0 0 100 150">
            <path stroke="#5eeeb5" d="M 85 30 C 60 -5, 10 10, 15 55 C 20 95, 85 85, 85 115 C 85 145, 30 155, 15 130" />
        </svg>
    </div>
    <div>
        <h3>Path 3 (Calligraphy strokes)</h3>
        <svg viewBox="0 0 100 150">
            <!-- Simulated brush stroke using filled path -->
            <path fill="#22c97d" stroke="none" d="M 85 25 C 60 -10, 5 5, 10 55 C 15 105, 90 90, 85 125 C 80 155, 20 155, 10 135 C 15 145, 60 160, 75 130 C 90 100, 15 110, 20 60 C 25 15, 75 -5, 85 20 Z" />
        </svg>
    </div>
    <div>
        <h3>Path 4 (Animated SVG Write)</h3>
        <svg viewBox="0 0 100 150">
            <path id="draw" stroke="#34d99a" stroke-width="3" d="M 85 35 C 70 15, 25 15, 20 55 C 15 95, 80 85, 80 120 C 80 150, 35 150, 20 130" stroke-dasharray="300" stroke-dashoffset="0">
               <animate attributeName="stroke-dashoffset" from="300" to="0" dur="2s" fill="freeze" />
            </path>
        </svg>
    </div>
</body>
</html>
